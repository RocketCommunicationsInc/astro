<rux-global-status-bar
  app-name="Astro"
  app-version="Angular"
></rux-global-status-bar>

<main style="padding: 2rem; max-width: 800px; margin: 0 auto">
  <h2 style="color: var(--color-text-primary, white); margin-bottom: 1.5rem">
    Form Accessor Test
  </h2>

  <!-- Reactive Forms -->
  <rux-container style="margin-bottom: 2rem">
    <header slot="header">Reactive Forms (<code>formControl</code>)</header>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      style="display: flex; flex-direction: column; gap: 1rem; padding: 1rem"
    >
      <rux-input
        label="Text input"
        formControlName="textInput"
        placeholder="Type something..."
      ></rux-input>

      <rux-input
        label="Number input"
        type="number"
        formControlName="numberInput"
        placeholder="0"
      ></rux-input>

      <rux-textarea
        label="Textarea"
        formControlName="textArea"
        placeholder="Type something..."
      ></rux-textarea>

      <rux-select label="Select" formControlName="selectValue">
        <rux-option value="" label="-- choose --"></rux-option>
        <rux-option value="a" label="Option A"></rux-option>
        <rux-option value="b" label="Option B"></rux-option>
        <rux-option value="c" label="Option C"></rux-option>
      </rux-select>

      <rux-radio-group label="Radio group" formControlName="radioGroup">
        <rux-radio value="one">One</rux-radio>
        <rux-radio value="two">Two</rux-radio>
        <rux-radio value="three">Three</rux-radio>
      </rux-radio-group>

      <rux-checkbox formControlName="checkboxValue">Checkbox</rux-checkbox>

      <rux-switch formControlName="switchValue">Switch</rux-switch>

      <rux-button type="submit">Submit</rux-button>
    </form>

    <pre
      style="
        color: var(--color-text-primary, white);
        padding: 1rem;
        font-size: 0.8rem;
      "
      >{{ formValues }}</pre
    >
  </rux-container>

  <!-- Template-driven ngModel -->
  <rux-container>
    <header slot="header">Template-driven (<code>ngModel</code>)</header>
    <div
      style="padding: 1rem; display: flex; flex-direction: column; gap: 1rem"
    >
      <!-- <rux-input
        label="ngModel text input"
        [(ngModel)]="ngModelText"
        name="ngModelText"
        placeholder="Type something..."
      ></rux-input> -->
      <p style="color: var(--color-text-primary, white)">
        Bound value: <strong>{{ ngModelText }}</strong>
      </p>
    </div>
  </rux-container>

  <!-- Standalone form (Angular 20 standalone import pattern) -->
  <app-standalone-form
    style="margin-top: 2rem; display: block"
  ></app-standalone-form>
  <app-standalone-astro
    style="margin-top: 2rem; display: block"
  ></app-standalone-astro>
</main>
